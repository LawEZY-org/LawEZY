name: Deploy Client

on:
  push:
    branches:
      - main
    paths:
      - 'LawEZY-Client/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

jobs:
  deploy-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: LawEZY-Client
        run: npm install
      
      - name: Build
        working-directory: LawEZY-Client
        run: npm run build
      
      - name: Deploy Client
        run: |
          echo "Deploying Client to production..."
          # Add your client deployment script here
          # Examples:
          # - Docker build and push
          # - Netlify/Vercel deployment
          # - S3 + CloudFront
          # - SSH to server: ssh user@server 'cd /app && npm run deploy'
